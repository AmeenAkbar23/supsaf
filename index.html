<div class="game-container">
    <canvas id="gameCanvas"></canvas>

    <div id="dashboard" class="ui-screen active">
        <div class="time-container">
            <h1 id="liveClock">00:00:00</h1>
            <p id="liveDate">Loading date...</p>
        </div>
        
        <div class="weather-container">
            <p id="weatherTemp">--°C</p>
            <p id="weatherDesc">Fetching local weather...</p>
        </div>

        <div class="focus-box">
            <input type="text" id="goalInput" placeholder="What is your focus today?">
        </div>
    </div>
</div>
