<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>supsaf</title>

    <link
        rel="icon"
        type="image/png"
        href="assets/logo.png"
    >

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <!-- LOGO -->
        <img
            src="assets/logo.png"
            alt="supsaf logo"
            class="logo"
        >

        <!-- TITLE -->
        <h1>Work in Progress</h1>

        <!-- DESCRIPTION -->
        <p>
            Something useful is being built here.
            Stay tuned.
        </p>

        <!-- LOADER -->
        <div class="loader"></div>

        <!-- SOCIAL BUTTONS -->
        <div class="social-buttons">

            <!-- INSTAGRAM -->
            <a
                href="https://www.instagram.com/SUPSAF/"
                target="_blank"
                class="social-btn"
            >
                <span>📸</span>
                Instagram
            </a>

            <!-- PINTEREST -->
            <a
                href="https://in.pinterest.com/madewithsupsaf/"
                target="_blank"
                class="social-btn"
            >
                <span>📌</span>
                Pinterest
            </a>

        </div>

        <!-- NOTIFY FORM -->
        <form
            action="https://formspree.io/f/xgozlnqa"
            method="POST"
            class="notify-box"
        >

            <input
                type="email"
                name="email"
                placeholder="Enter your email"
                required
            >

            <button type="submit">
                Notify Me
            </button>

        </form>

    </div>

</body>

</html>
